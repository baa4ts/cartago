name: CARTAGO Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake x64
      run: cmake -B build/x64 -G "Visual Studio 17 2022" -A x64

    - name: Configure CMake x86
      run: cmake -B build/x86 -G "Visual Studio 17 2022" -A Win32

    - name: Compilar Release x64
      run: cmake --build build/x64 --config Release

    - name: Compilar Release x86
      run: cmake --build build/x86 --config Release

    - name: Hash exe x64
      shell: bash
      run: sha256sum build/x64/Release/CARTAGO.exe > CARTAGO-x64.exe.sha256

    - name: Attest exe x64
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: build/x64/Release/CARTAGO.exe

    - name: Hash exe x86
      shell: bash
      run: sha256sum build/x86/Release/CARTAGO.exe > CARTAGO-x86.exe.sha256

    - name: Attest exe x86
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: build/x86/Release/CARTAGO.exe

    - name: Empaquetar x64
      run: |
        Compress-Archive -Path build/x64/Release/CARTAGO.exe, CARTAGO-x64.exe.sha256 `
          -DestinationPath CARTAGO-x64.zip

    - name: Attest zip x64
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: CARTAGO-x64.zip

    - name: Empaquetar x86
      run: |
        Compress-Archive -Path build/x86/Release/CARTAGO.exe, CARTAGO-x86.exe.sha256 `
          -DestinationPath CARTAGO-x86.zip

    - name: Attest zip x86
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: CARTAGO-x86.zip

    - name: Publicar Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          CARTAGO-x64.zip
          CARTAGO-x86.zip
          CARTAGO-x64.exe.sha256
          CARTAGO-x86.exe.sha256
        name: CARTAGO ${{ github.ref_name }}
        draft: false
        prerelease: false